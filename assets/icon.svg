<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Three kanban columns -->
  <rect x="1"  y="3" width="6" height="18" rx="1.5"/>
  <rect x="9"  y="3" width="6" height="18" rx="1.5"/>
  <rect x="17" y="3" width="6" height="18" rx="1.5"/>
  <!-- Cards in column 1 -->
  <line x1="2.5" y1="6.5"  x2="5.5" y2="6.5"/>
  <line x1="2.5" y1="9"    x2="5.5" y2="9"/>
  <!-- Cards in column 2 -->
  <line x1="10.5" y1="6.5" x2="13.5" y2="6.5"/>
  <!-- Cards in column 3 -->
  <line x1="18.5" y1="6.5" x2="21.5" y2="6.5"/>
  <line x1="18.5" y1="9"   x2="21.5" y2="9"/>
</svg>
